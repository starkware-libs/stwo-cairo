name: Scarb test
on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
  merge_group:
    types:
      - checks_requested

# On PR events, cancel existing CI runs on this same PR for this workflow.
# Also, create different concurrency groups for different pushed commits, on push events.
concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.ref }}-
    ${{ github.event_name == 'pull_request' && 'PR' || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scarb-test:
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: ./stwo_cairo_verifier
    strategy:
      matrix:
        feature: [poseidon252_verifier, "poseidon252_verifier,poseidon_outputs_packing", qm31_opcode, "qm31_opcode,blake_outputs_packing", "qm31_opcode,poseidon_outputs_packing"]
        package:
          - stwo_verifier_core
          - stwo_cairo_air
          - stwo_cairo_verifier
          - stwo_verifier_utils
        include:
          # ==========================================
          # Proof Files Mapping
          # ==========================================
          - feature: poseidon252_verifier
            proof_file: ../stwo_cairo_prover/test_data/test_prove_verify_ret_opcode/proof.json
          - feature: "poseidon252_verifier,poseidon_outputs_packing"
            proof_file: ../stwo_cairo_prover/test_data/test_prove_verify_ret_opcode/proof.json
          - feature: qm31_opcode
            proof_file: ../stwo_cairo_prover/test_data/test_prove_verify_all_opcode_components/proof.json
          - feature: "qm31_opcode,blake_outputs_packing"
            proof_file: ../stwo_cairo_prover/test_data/test_prove_verify_all_opcode_components/proof.json
          - feature: "qm31_opcode,poseidon_outputs_packing"
            proof_file: ../stwo_cairo_prover/test_data/test_prove_verify_all_opcode_components/proof.json
          # ==========================================
          # Explicit Runner Size Mapping (20 combinations)
          # ==========================================
          # 1. stwo_verifier_utils (All small)
          - feature: poseidon252_verifier
            package: stwo_verifier_utils
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "poseidon252_verifier,poseidon_outputs_packing"
            package: stwo_verifier_utils
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: qm31_opcode
            package: stwo_verifier_utils
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "qm31_opcode,blake_outputs_packing"
            package: stwo_verifier_utils
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "qm31_opcode,poseidon_outputs_packing"
            package: stwo_verifier_utils
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          # 2. stwo_verifier_core (All small)
          - feature: poseidon252_verifier
            package: stwo_verifier_core
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "poseidon252_verifier,poseidon_outputs_packing"
            package: stwo_verifier_core
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: qm31_opcode
            package: stwo_verifier_core
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "qm31_opcode,blake_outputs_packing"
            package: stwo_verifier_core
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "qm31_opcode,poseidon_outputs_packing"
            package: stwo_verifier_core
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          # 3. stwo_cairo_air (poseidon = small, qm31 = xlarge)
          - feature: poseidon252_verifier
            package: stwo_cairo_air
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: "poseidon252_verifier,poseidon_outputs_packing"
            package: stwo_cairo_air
            runner: namespace-profile-starkware-libs-stwo-cairo-small-ubuntu-24-04-amd64
          - feature: qm31_opcode
            package: stwo_cairo_air
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64
          - feature: "qm31_opcode,blake_outputs_packing"
            package: stwo_cairo_air
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64
          - feature: "qm31_opcode,poseidon_outputs_packing"
            package: stwo_cairo_air
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64
          # 4. stwo_cairo_verifier (poseidon252 = medium, poseidon_packing = large, qm31 = xlarge)
          - feature: poseidon252_verifier
            package: stwo_cairo_verifier
            runner: namespace-profile-starkware-libs-stwo-cairo-medium-ubuntu-24-04-amd64
          - feature: "poseidon252_verifier,poseidon_outputs_packing"
            package: stwo_cairo_verifier
            runner: namespace-profile-starkware-libs-stwo-cairo-large-ubuntu-24-04-amd64
          - feature: qm31_opcode
            package: stwo_cairo_verifier
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64
          - feature: "qm31_opcode,blake_outputs_packing"
            package: stwo_cairo_verifier
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64
          - feature: "qm31_opcode,poseidon_outputs_packing"
            package: stwo_cairo_verifier
            runner: namespace-profile-starkware-libs-stwo-cairo-xlarge-ubuntu-24-04-amd64

    steps:
      - uses: actions/checkout@v6
      - name: Setup Namespace cache
        uses: ./.github/actions/setup-namespace-cache
        with:
          profile: scarb-test
      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.0"
          scarb-lock: stwo_cairo_verifier/Scarb.lock
      - run: scarb test --features=${{ matrix.feature }} --package ${{ matrix.package }}
      - if: matrix.package == 'stwo_cairo_verifier'
        run: scarb --profile proving execute --package stwo_cairo_verifier --features ${{ matrix.feature }} --print-resource-usage --output none --arguments-file ${{ matrix.proof_file }}
